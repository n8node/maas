map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream mn_backend {
    server backend:8080;
    keepalive 32;
}

upstream mn_frontend {
    server frontend:3000;
    keepalive 32;
}

upstream mn_wordpress {
    server wordpress:80;
    keepalive 8;
}

# HTTP: ACME + те же прокси, что и на 443 (через locations.inc).
# После включения HTTPS рекомендуется оставить только ACME и редирект на https —
# см. комментарий внизу файла.

server {
    listen 80;
    listen [::]:80;
    server_name localhost mnemoniqa.com www.mnemoniqa.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    include /etc/nginx/conf.d/locations.inc;
}

# Редирект всего HTTP→HTTPS (раскомментировать после того как https.conf подключён и проверен).
# Тогда в server :80 выше уберите include locations.inc и оставьте только:
#   location /.well-known/acme-challenge/ { root /var/www/certbot; }
#   location / { return 301 https://$host$request_uri; }
