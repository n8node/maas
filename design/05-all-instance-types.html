<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MemoryService — All Instance Types</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f8f8f7;--bg3:#f3f2ef;
  --text:#1a1a1a;--text2:#5f5e5a;--text3:#888780;
  --border:#e8e7e3;--border2:#d3d1c7;
  --radius:8px;--radius-lg:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'SF Mono','Fira Mono',monospace;
}
body{font-family:var(--font);font-size:13px;background:var(--bg3);color:var(--text)}
.switcher{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px;background:var(--bg);border-bottom:1px solid var(--border);align-items:center;position:sticky;top:0;z-index:20}
.sw-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:12px;color:var(--text2);font-family:var(--font);display:flex;align-items:center;gap:5px;transition:all .12s}
.sw-btn:hover{background:var(--bg2)}
.sw-btn.active{border-width:2px;font-weight:500}
.sw-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.shell{min-height:560px}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;height:46px;display:flex;align-items:center;justify-content:space-between}
.breadcrumb{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.bc-cur{color:var(--text);font-weight:500}
.btn-xs{padding:4px 10px;border:1px solid var(--border2);border-radius:5px;background:transparent;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.btn-xs:hover{background:var(--bg2)}
.btn-xs.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.status-pill{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2);background:var(--bg2);padding:3px 9px;border-radius:20px;border:1px solid var(--border)}
.stat-strip{display:flex;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 20px}
.stat-cell{flex:1;padding:0 14px;border-right:1px solid var(--border)}
.stat-cell:first-child{padding-left:0}.stat-cell:last-child{border-right:none}
.sv{font-size:18px;font-weight:500;letter-spacing:-0.02em}
.sk{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
.ss{font-size:11px;color:var(--text3);margin-top:2px}
.tab-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 20px;display:flex;overflow-x:auto}
.tab{font-size:12px;color:var(--text2);padding:0 12px;height:38px;display:flex;align-items:center;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;gap:5px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:#1a1a1a;font-weight:500}
.tb{font-size:9px;background:var(--bg2);color:var(--text3);padding:1px 5px;border-radius:7px}
.tab.active .tb{background:#1a1a1a;color:#fff}
.content{padding:16px 20px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:500;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tbl{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px}
.tbl-head{padding:7px 14px;border-bottom:1px solid var(--border);background:var(--bg2);display:grid}
.th{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.tbl-row{padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer;display:grid}
.tbl-row:last-child{border-bottom:none}
.tbl-row:hover{background:var(--bg2)}
.td{font-size:12px;display:flex;align-items:center;gap:5px}
.badge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.b-active{background:#eaf3de;color:#3b6d11}
.b-stale{background:#faeeda;color:#854f0b}
.b-disputed{background:#fcebeb;color:#a32d2d}
.hrow{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.hl{font-size:11px;color:var(--text3);width:72px;flex-shrink:0}
.ht{flex:1;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.hf{height:100%;border-radius:2px}
.hf-g{background:#639922}.hf-w{background:#ba7517}.hf-p{background:#534ab7}.hf-b{background:#185fa5}
.hv{font-size:11px;font-weight:500;min-width:32px;text-align:right}
.hv-g{color:#3b6d11}.hv-w{color:#ba7517}
.cb-bar{display:flex;align-items:center;gap:5px}
.cb-track{width:40px;height:3px;background:var(--bg2);border-radius:2px;overflow:hidden}
.cb-fill{height:100%;border-radius:2px}
.metric{text-align:center;padding:8px;background:var(--bg2);border-radius:6px}
.mv{font-size:14px;font-weight:500}.mk{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.kv-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.kv-row:last-child{border-bottom:none}
.kv-key{font-family:var(--mono);font-size:12px;color:#534ab7;min-width:120px}
.kv-val{flex:1;font-size:12px;color:var(--text2)}
.kv-ttl{font-size:10px;color:var(--text3)}
.decay-bar{height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;margin-top:4px}
.decay-fill{height:100%;border-radius:2px;background:#3b6d11}
.log-row{display:flex;gap:8px;padding:8px 14px;border-bottom:1px solid var(--border)}
.log-row:last-child{border-bottom:none}
.log-icon{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.log-act{font-size:12px}.log-rat{font-size:11px;color:var(--text3);font-style:italic;margin-top:2px}
.log-meta{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.ap{font-size:10px;font-weight:500;padding:1px 6px;border-radius:3px;margin-right:4px}
.ap-create{background:#eaf3de;color:#3b6d11}
.ap-attach{background:#e6f1fb;color:#185fa5}
.ap-refine{background:#eeedfe;color:#534ab7}
.ap-reject{background:#f1efe8;color:#5f5e5a}
.prop-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px}
.pt{font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px}
.pt-merge{background:#fbeaf0;color:#993556}
.pt-split{background:#e6f1fb;color:#185fa5}
.pt-noise{background:#f1efe8;color:#5f5e5a}
.btn-approve{background:#1a1a1a;color:#fff;border:none;border-radius:5px;padding:4px 12px;font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font)}
.btn-reject{background:transparent;border:1px solid var(--border2);border-radius:5px;padding:4px 12px;font-size:11px;color:var(--text2);cursor:pointer;font-family:var(--font)}
.rq-row{display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border)}
.rq-row:last-child{border-bottom:none}
.rq-prio{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;flex-shrink:0}
.layer-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;margin-bottom:6px}
.lv-prio{width:18px;height:18px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text2);flex-shrink:0}
.lv-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tgl{width:28px;height:16px;border-radius:8px;position:relative;cursor:pointer;flex-shrink:0}
.tgl.on{background:#1a1a1a}.tgl.off{background:var(--border2)}
.tgl::after{content:'';position:absolute;width:10px;height:10px;background:#fff;border-radius:50%;top:3px;transition:left .15s}
.tgl.on::after{left:15px}.tgl.off::after{left:3px}
.reaction-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.reaction-row:last-child{border-bottom:none}
.pattern-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:8px}
.pc-name{font-size:13px;font-weight:500;margin-bottom:2px}
.pc-ev{font-size:11px;color:var(--text3);margin-bottom:6px}
.pc-desc{font-size:12px;color:var(--text2);line-height:1.4;margin-bottom:8px}
.graph-vis{background:var(--bg2);border-radius:var(--radius);height:160px;position:relative;overflow:hidden;margin-bottom:10px}
.gnode{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;transform:translate(-50%,-50%)}
.gnode-circle{width:26px;height:26px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center}
.gnode-label{font-size:9px;color:var(--text2);text-align:center;max-width:52px;line-height:1.2}
.cit-inline{display:inline;border-radius:3px;padding:0 3px;font-size:10px;font-weight:500}
.qr-box{background:var(--bg2);border-radius:var(--radius);padding:10px 12px;font-size:12px;line-height:1.6;margin-bottom:8px}
.cit-row{display:flex;gap:7px;align-items:flex-start;padding:6px 10px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:5px}
.cb{font-size:10px;font-weight:500;padding:2px 6px;border-radius:3px;flex-shrink:0}
textarea.pg{width:100%;border:1px solid var(--border2);border-radius:var(--radius);padding:8px;font-size:12px;resize:none;background:var(--bg);color:var(--text);font-family:var(--font);line-height:1.5}
textarea.pg:focus{outline:none;border-color:#888}
.mi{height:28px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font)}
.ms{height:28px;border:1px solid var(--border2);border-radius:var(--radius);padding:0 8px;font-size:12px;background:var(--bg);color:var(--text);font-family:var(--font);cursor:pointer}
.btn-dark{background:#1a1a1a;color:#fff;border:none;border-radius:var(--radius);padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>
<!-- Type switcher -->
<div class="switcher" id="switcher"></div>
<div class="shell" id="shell"></div>

<script>
const types={
  rag:{name:'FAQ Knowledge Base',label:'RAG',color:'#185fa5',bg:'#e6f1fb',statusDot:'#639922',
    stats:[{v:'847',k:'Chunks',s:'12 topics clustered'},{v:'23',k:'Documents',s:'last: 2h ago'},{v:'312',k:'Queries today',s:'↑8% vs yesterday'},{v:'0.91',k:'Avg score',s:'top-5 results'},{v:'88%',k:'Coverage',s:'high_conf: 71%'}],
    tabs:['Playground','Documents','Topics','Settings'],extraBtns:[]},
  wiki:{name:'Product Knowledge Base',label:'Wiki',color:'#534ab7',bg:'#eeedfe',statusDot:'#639922',
    stats:[{v:'234',k:'Concepts',s:'3 stale · 1 disputed'},{v:'18',k:'Sources',s:'147 segments'},{v:'89',k:'Queries today',s:'↑12%'},{v:'0.84',k:'Purity',s:'coverage 82%'},{v:'14%',k:'Stale ratio',s:'gardener pending'}],
    tabs:['Playground','Concepts','Action log','Gardener','Settings'],extraBtns:[]},
  episodic:{name:'Coach Bot History',label:'Episodic',color:'#3b6d11',bg:'#eaf3de',statusDot:'#639922',
    stats:[{v:'5.2K',k:'Episodes',s:'bi-temporal on'},{v:'0.73',k:'Avg decay',s:'rate: 0.05/day'},{v:'89',k:'Queries today',s:'312 users scoped'},{v:'Jul 2024',k:'Oldest entry',s:'14 months history'},{v:'76%',k:'Coverage',s:'anchored 68%'}],
    tabs:['Playground','Episodes','Timeline','Decay','Settings'],extraBtns:['Run decay']},
  working:{name:'Session Context',label:'Working',color:'#854f0b',bg:'#faeeda',statusDot:'#639922',
    stats:[{v:'127',k:'Sessions',s:'43 active now'},{v:'1,840',k:'Keys total',s:'all sessions'},{v:'15m',k:'Default TTL',s:'max: 4h'},{v:'94%',k:'Hit rate',s:'last 24h'},{v:'2.1 MB',k:'Memory used',s:'of 100 MB limit'}],
    tabs:['Sessions','Keys','Settings'],extraBtns:['Flush expired']},
  graph:{name:'Entity Graph',label:'Graph',color:'#993c1d',bg:'#faece7',statusDot:'#ba7517',
    stats:[{v:'1.1K',k:'Entities',s:'8 types'},{v:'3.4K',k:'Relations',s:'6 relation types'},{v:'4',k:'Repair queue',s:'2 high priority'},{v:'100%',k:'Grounding',s:'all have source_id'},{v:'0.81',k:'Avg confidence',s:'12 disputed'}],
    tabs:['Playground','Entities','Relations','Repair queue','Settings'],extraBtns:['Run invalidation']},
  reflective:{name:'User Patterns',label:'Reflective',color:'#993556',bg:'#fbeaf0',statusDot:'#639922',
    stats:[{v:'47',k:'Patterns',s:'≥3 episodes each'},{v:'12',k:'Tensions',s:'3 unresolved'},{v:'284',k:'Reactions',s:'312 users tracked'},{v:'0.79',k:'Avg confidence',s:'68% inferred'},{v:'8',k:'Repair queue',s:'low confidence'}],
    tabs:['Reactions','Patterns','Tensions','Action log','Settings'],extraBtns:[]},
  agent:{name:'Coach Bot',label:'Agent (unified)',color:'#1a1a1a',bg:'#f1efe8',statusDot:'#639922',
    stats:[{v:'4',k:'Layers',s:'1 paused'},{v:'2.3K',k:'Queries/mo',s:'weighted strategy'},{v:'0.89',k:'Confidence',s:'avg synthesis'},{v:'4.2K',k:'Tokens/query',s:'avg context'},{v:'1.85s',k:'Avg latency',s:'parallel retrieval'}],
    tabs:['Playground','Layers','Health','Settings'],extraBtns:['Core memory']},
};

let curType='rag',curTab=0;

// Build switcher
const sw=document.getElementById('switcher');
Object.entries(types).forEach(([id,cfg])=>{
  const btn=document.createElement('button');
  btn.className='sw-btn';btn.dataset.id=id;
  btn.innerHTML=`<div class="sw-dot" style="background:${cfg.color}"></div>${cfg.label}`;
  btn.onclick=()=>setType(id);
  sw.appendChild(btn);
});

function setType(id){
  curType=id;curTab=0;
  document.querySelectorAll('.sw-btn').forEach(b=>{
    const active=b.dataset.id===id;
    b.classList.toggle('active',active);
    if(active){b.style.borderColor=types[id].color;b.style.color=types[id].color;b.style.background=types[id].bg;}
    else{b.style.borderColor='';b.style.color='';b.style.background='';}
  });
  render();
}

function render(){
  const cfg=types[curType];
  document.getElementById('shell').innerHTML=`
  <div class="topbar">
    <div class="breadcrumb"><span>${cfg.label==='Agent (unified)'?'Agents':'Instances'}</span><span>›</span><span class="bc-cur">${cfg.name}</span></div>
    <div style="display:flex;align-items:center;gap:7px">
      <div class="status-pill"><div style="width:6px;height:6px;border-radius:50%;background:${cfg.statusDot}"></div>Active</div>
      ${cfg.extraBtns.map(b=>`<button class="btn-xs">${b}</button>`).join('')}
      <button class="btn-xs">Settings</button>
      <button class="btn-xs dark">${cfg.label==='Agent (unified)'?'Unified query':'Ingest'}</button>
    </div>
  </div>
  <div class="stat-strip">${cfg.stats.map((s,i)=>`<div class="stat-cell"${i===cfg.stats.length-1?' style="border-right:none"':''}><div class="sv">${s.v}</div><div class="sk">${s.k}</div><div class="ss">${s.s}</div></div>`).join('')}</div>
  <div class="tab-bar">${cfg.tabs.map((t,i)=>`<div class="tab${i===curTab?' active':''}" onclick="setTab(${i})">${t}</div>`).join('')}</div>
  <div class="content" id="tab-content">${getTabContent(curType,curTab)}</div>`;
}

function setTab(i){
  curTab=i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active',idx===i));
  document.getElementById('tab-content').innerHTML=getTabContent(curType,i);
}

function getTabContent(type,tab){
  const fns={
    rag:[ragPlay,ragDocs,ragTopics,genericSettings],
    wiki:[wikiPlay,wikiConcepts,wikiLog,wikiGardener,genericSettings],
    episodic:[epPlay,epEpisodes,epTimeline,epDecay,genericSettings],
    working:[wkSessions,wkKeys,genericSettings],
    graph:[graphPlay,graphEntities,graphRelations,graphRepair,genericSettings],
    reflective:[refReactions,refPatterns,refTensions,refLog,genericSettings],
    agent:[agentPlay,agentLayers,agentHealth,genericSettings],
  };
  return (fns[type]&&fns[type][tab])?fns[type][tab]():'<div style="padding:32px;text-align:center;color:var(--text3)">Content goes here</div>';
}

// ── RAG ──────────────────────────────────────────
function ragPlay(){return `<div class="two-col">
<div><div class="card"><div class="card-title">Ingest document</div>
<textarea class="pg" rows="5" placeholder="Paste text, markdown or drop a file…"></textarea>
<div style="display:flex;gap:6px;margin-top:7px"><input class="mi" style="flex:1" placeholder="user_id"/><button class="btn-dark">Ingest async</button></div>
</div>
<div class="card"><div class="card-title">Chunk preview</div>
<div style="background:var(--bg2);border-radius:5px;padding:8px;font-size:11px;color:var(--text2);line-height:1.5">
<span style="background:#b5d4f4;color:#0c447c;padding:1px 3px;border-radius:2px">Chunk 1 — 512 tok</span> The engineering team will focus on three key initiatives…
<span style="background:#c0dd97;color:#27500a;padding:1px 3px;border-radius:2px;margin-left:2px">Chunk 2 — 498 tok</span> API rate limiting overhaul will reduce error rates by 40%…
</div></div></div>
<div><div class="card"><div class="card-title">Query</div>
<input class="mi" style="width:100%;margin-bottom:8px" placeholder="What is the main topic?"/>
<div style="display:flex;gap:6px;margin-bottom:8px"><select class="ms"><option>top_k = 5</option><option>top_k = 10</option></select><button class="btn-dark">Search</button></div>
<div class="qr-box">Top 3 chunks match with avg score 0.91. Documents cover API rate limiting <span class="cit-inline" style="background:#e6f1fb;color:#185fa5">[RAG:chunk_12]</span> and Q3 engineering priorities <span class="cit-inline" style="background:#e6f1fb;color:#185fa5">[RAG:chunk_34]</span>.</div>
<div class="cit-row"><span class="cb" style="background:#e6f1fb;color:#185fa5">RAG</span><span style="font-size:11px;color:var(--text2);flex:1">API rate limiting — overhaul to reduce errors by 40%</span><span style="font-size:10px;color:var(--text3)">0.95</span></div>
<div class="cit-row"><span class="cb" style="background:#e6f1fb;color:#185fa5">RAG</span><span style="font-size:11px;color:var(--text2);flex:1">Q3 priorities: rate limiting, webhooks, MCP integration</span><span style="font-size:10px;color:var(--text3)">0.88</span></div>
</div></div></div>`;}

function ragDocs(){
  const docs=[['roadmap-q3.pdf','8.4 KB','12','Active','2h ago'],['faq-v2.md','3.1 KB','7','Active','1d ago'],['onboarding.docx','14.2 KB','22','Active','3d ago']];
  return `<div class="tbl"><div class="tbl-head" style="grid-template-columns:1fr 70px 70px 70px 70px"><div class="th">Name</div><div class="th">Size</div><div class="th">Chunks</div><div class="th">Status</div><div class="th">Indexed</div></div>
  ${docs.map(d=>`<div class="tbl-row" style="grid-template-columns:1fr 70px 70px 70px 70px"><div class="td" style="font-weight:500">📄 ${d[0]}</div><div class="td" style="color:var(--text3)">${d[1]}</div><div class="td">${d[2]}</div><div class="td"><span class="badge b-active">${d[3]}</span></div><div class="td" style="color:var(--text3)">${d[4]}</div></div>`).join('')}</div>`;}

function ragTopics(){return `<div class="card"><div class="card-title">Hierarchical clusters</div>
${[['Engineering Roadmap',['API Rate Limiting','Q3 Priorities','MCP Integration'],34,'0.89'],['Product Features',['Webhooks System','SDK Overview','Auth Flow'],28,'0.85'],['Support & FAQ',['Billing Questions','Account Setup'],21,'0.91']].map(([n,subs,chunks,score])=>`
<div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><div style="font-size:13px;font-weight:500">${n}</div><div style="font-size:11px;color:var(--text3)">${chunks} chunks · score ${score}</div></div>
<div style="display:flex;gap:5px;flex-wrap:wrap">${subs.map(s=>`<span style="font-size:11px;background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:4px;color:var(--text2)">${s}</span>`).join('')}</div>
</div>`).join('')}</div>`;}

// ── WIKI ──────────────────────────────────────────
function wikiPlay(){return `<div class="two-col">
<div><div class="card"><div class="card-title">Ingest → concept extraction (SGR)</div>
<textarea class="pg" rows="6" placeholder="Text or markdown — cheap model extracts concept hypotheses…"></textarea>
<div class="card-title" style="margin-top:8px;margin-bottom:6px">Extraction preview</div>
${[{t:'API Rate Limiting',type:'project',conf:'0.88',act:'create',actBg:'#eaf3de',actCol:'#3b6d11'},{t:'Q3 Engineering',type:'fact',conf:'0.95',act:'create',actBg:'#eaf3de',actCol:'#3b6d11'},{t:'team',type:'entity',conf:'0.31',act:'reject',actBg:'#f1efe8',actCol:'#5f5e5a'}].map(c=>`

  <div class="tbl"><div class="tbl-head" style="grid-template-columns:1fr 80px 110px 90px 80px"><div class="th">Reaction state</div><div class="th">Epistemic</div><div class="th">User</div><div class="th">Intensity</div><div class="th">Age</div></div>
  ${rcts.map(([state,ep,intensity,user,age])=>`<div class="tbl-row" style="grid-template-columns:1fr 80px 110px 90px 80px">
  <div class="td" style="font-weight:500;gap:6px"><div style="width:6px;height:6px;border-radius:50%;background:#993556;flex-shrink:0"></div>${state}</div>
  <div class="td"><span style="font-size:10px;background:${ep==='explicit'?'#eeedfe':'#f1efe8'};color:${ep==='explicit'?'#534ab7':'#5f5e5a'};padding:2px 6px;border-radius:3px;font-weight:500">${ep}</span></div>

  <div class="td" style="color:var(--text3)">${age}</div></div>`).join('')}</div>`;}

].map(p=>`<div class="pattern-card">

function refLog(){

  return `<div class="tbl">${acts.map(([act,c,actor,rat,bg,col])=>`<div class="log-row">
